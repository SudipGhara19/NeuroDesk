# Nginx Reverse Proxy Configuration
# Usually placed in /etc/nginx/nginx.conf or /etc/nginx/sites-available/default

events {
    worker_connections 1024;
}

http {
    # General Optimization Logging
    access_log /var/log/nginx/neurodesk_access.log;
    error_log /var/log/nginx/neurodesk_error.log;

    server {
        listen 80;
        server_name your-domain.com www.your-domain.com localhost;

        # Frontend Next.js Proxy
        location / {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Backend Node.js API Proxy
        location /api/ {
            proxy_pass http://localhost:5868/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Socket.io Real-time WebSocket Proxy
        location /socket.io/ {
            proxy_pass http://localhost:5868/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400; # Keep websocket open
        }
    }
}
